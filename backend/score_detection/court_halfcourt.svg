<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="940" viewBox="0 0 50 47" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="50" height="47" fill="#1f2937" />

  <!-- Court lines -->
  <g stroke="#374151" stroke-width="0.3" fill="none">
    <!-- Court boundary -->
    <rect x="0" y="0" width="50" height="47" />

    <!-- Penalty box (paint) -->
    <rect x="17" y="0" width="16" height="19" />

    <!-- Free throw circle -->
    <circle cx="25" cy="19" r="6" />

    <!-- 3-point arc -->
    <path d="M 3 0 L 3 14 Q 25 43 47 14 L 47 0" />

    <!-- Basket -->
    <circle cx="25" cy="5.25" r="0.75" stroke="#ef4444" stroke-width="0.4" fill="none" />

    <!-- Backboard -->
    <line x1="22" y1="4" x2="28" y2="4" stroke="#374151" stroke-width="0.3" />
  </g>

  <!-- Court dimensions text (optional) -->
  <text x="25" y="46" text-anchor="middle" font-size="1.5" fill="#6b7280" font-family="Arial">
    FIBA Half Court
  </text>
</svg>
